# Project information
site_name: Cybersecurity Matrix 
use_directory_urls: true

# Configuration
theme:
  name: material
  custom_dir: overrides
  favicon: assets/security.svg
  icon:
    # logo: material/rocket-launch
    logo: material/security
    # repo: fontawesome/brands/github
  palette:
    - scheme: slate      # 深色模式
      primary: black
      accent: orange
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    # - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono

  toc:
    on_page: true
    depth: 5


